---
# TEST 1: exact 1:2 — ✅ valid
apiVersion: apps/v2
kind: Deployment
metadata:
  name: test-exact-1-2
spec:
  template:
    spec:
      containers:
        - name: app
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

