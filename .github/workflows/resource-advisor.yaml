name: Resource Advisor

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  advise:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Install PyYAML
        run: pip3 install pyyaml --break-system-packages

      - name: Run advisor
        run: |
          python3 .github/scripts/resource_advisor.py \
            --base origin/${{ github.event.pull_request.base.ref }} \
            --head HEAD \
            --output /tmp/suggestion.md

      
      - name: Post comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            if (!fs.existsSync('/tmp/suggestion.md')) {
              console.log('All ratios valid — no comment posted.');
              return;
            }

            const body = fs.readFileSync('/tmp/suggestion.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
