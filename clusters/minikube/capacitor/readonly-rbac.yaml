apiVersion: v1
kind: ServiceAccount
metadata:
  name: capacitor-readonly
  namespace: capacitor-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capacitor-readonly
rules:
# Flux CRDs
- apiGroups:
  - source.toolkit.fluxcd.io
  resources:
  - gitrepositories
  - helmrepositories
  - ocirepositories
  - buckets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kustomize.toolkit.fluxcd.io
  resources:
  - kustomizations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - helm.toolkit.fluxcd.io
  resources:
  - helmreleases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - notification.toolkit.fluxcd.io
  resources:
  - providers
  - alerts
  - receivers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - image.toolkit.fluxcd.io
  resources:
  - imagepolicies
  - imagerepositories
  - imageupdateautomations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infra.contrib.fluxcd.io
  resources:
  - terraforms
  verbs:
  - get
  - list
  - watch

# Core Kubernetes resources (ADDED: events)
- apiGroups: [""]
  resources:
  - namespaces
  - pods
  - services
  - configmaps
  - secrets
  - events          # ← ADDED: Required for Flux events display
  verbs:
  - get
  - list
  - watch

# Apps resources
- apiGroups: ["apps"]
  resources:
  - deployments
  - statefulsets
  - daemonsets
  - replicasets
  verbs:
  - get
  - list
  - watch

# Networking resources (ADDED: ingresses)
- apiGroups: ["networking.k8s.io"]
  resources:
  - ingresses       # ← ADDED: Required for ingress display
  - ingressclasses
  verbs:
  - get
  - list
  - watch

# Optional: Add more if needed
- apiGroups: ["batch"]
  resources:
  - jobs
  - cronjobs
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capacitor-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capacitor-readonly
subjects:
- kind: ServiceAccount
  name: capacitor-readonly
  namespace: capacitor-system

