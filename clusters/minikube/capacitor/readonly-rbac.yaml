apiVersion: v1
kind: ServiceAccount
metadata:
  name: capacitor-readonly
  namespace: capacitor-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capacitor-readonly
rules:
# ===== FLUX SOURCE CRDs =====
- apiGroups: ["source.toolkit.fluxcd.io"]
  resources:
  - gitrepositories
  - helmrepositories
  - ocirepositories
  - buckets
  - helmcharts
  - artifacts
  verbs: ["get", "list", "watch"]

# ===== FLUX KUSTOMIZE CRDs =====
- apiGroups: ["kustomize.toolkit.fluxcd.io"]
  resources:
  - kustomizations
  verbs: ["get", "list", "watch"]

# ===== FLUX HELM CRDs =====
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources:
  - helmreleases
  - helmcharts
  verbs: ["get", "list", "watch"]

# ===== FLUX NOTIFICATION CRDs =====
- apiGroups: ["notification.toolkit.fluxcd.io"]
  resources:
  - providers
  - alerts
  - receivers
  verbs: ["get", "list", "watch"]

# ===== FLUX IMAGE CRDs =====
- apiGroups: ["image.toolkit.fluxcd.io"]
  resources:
  - imagepolicies
  - imagerepositories
  - imageupdateautomations
  verbs: ["get", "list", "watch"]

# ===== FLUX TERRAFORM CRDs =====
- apiGroups: ["infra.contrib.fluxcd.io"]
  resources:
  - terraforms
  verbs: ["get", "list", "watch"]

# ===== CORE KUBERNETES RESOURCES =====
- apiGroups: [""]
  resources:
  - namespaces
  - pods
  - pods/log
  - services
  - configmaps
  - secrets
  - events
  - serviceaccounts
  - persistentvolumeclaims
  verbs: ["get", "list", "watch"]

# ===== APPS RESOURCES =====
- apiGroups: ["apps"]
  resources:
  - deployments
  - statefulsets
  - daemonsets
  - replicasets
  verbs: ["get", "list", "watch"]

# ===== NETWORKING RESOURCES =====
- apiGroups: ["networking.k8s.io"]
  resources:
  - ingresses
  - ingressclasses
  - networkpolicies
  verbs: ["get", "list", "watch"]

# ===== BATCH RESOURCES =====
- apiGroups: ["batch"]
  resources:
  - jobs
  - cronjobs
  verbs: ["get", "list", "watch"]

# ===== RBAC RESOURCES =====
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
  - roles
  - rolebindings
  - clusterroles
  - clusterrolebindings
  verbs: ["get", "list", "watch"]

# ===== METRICS =====
- apiGroups: ["metrics.k8s.io"]
  resources:
  - pods
  - nodes
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capacitor-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capacitor-readonly
subjects:
- kind: ServiceAccount
  name: capacitor-readonly
  namespace: capacitor-system

