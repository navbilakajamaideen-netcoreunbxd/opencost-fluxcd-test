apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capacitor
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ./
      sourceRef:
        kind: GitRepository
        name: capacitor-helm-chart
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: capacitor-cluster-values
      valuesKey: values.yaml
