apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capacitor
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: capacitor
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: capacitor
        namespace: flux-system
  values:
    service:
      type: ClusterIP
      port: 9000
