apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capacitor
  namespace: monitoring
  annotations:
    fluxcd.io/automated: "true"

spec:
  interval: 10m

  chart:
    spec:
      reconcileStrategy: Revision
      chart: ./unx_resources/team-platform/infra/capacitor
      sourceRef:
        kind: GitRepository
        name: capacitor-helm-chart
        namespace: flux-system

  targetNamespace: monitoring

  valuesFrom:
    - kind: ConfigMap
      name: capacitor-cluster-values
