apiVersion: v1
kind: ServiceAccount
metadata:
  name: capacitor
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capacitor-read-only
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capacitor-read-only-binding
subjects:
  - kind: ServiceAccount
    name: capacitor
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: capacitor-read-only
  apiGroup: rbac.authorization.k8s.io
