apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 10m
  chart:
    spec:
      chart: headlamp
      version: "0.25.1"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
      interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: headlamp-values
