apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-values
  namespace: headlamp
data:
  values.yaml: |
    replicaCount: 1

    resources:
      limits:
        cpu: 120m
        memory: 150Mi
      requests:
        cpu: 730m
        memory: 850Mi

    service:
      type: ClusterIP
      port: 80

    rbac:
      create: true

    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - host: headlamp.local
          paths:
            - path: /
              pathType: Prefix
              

