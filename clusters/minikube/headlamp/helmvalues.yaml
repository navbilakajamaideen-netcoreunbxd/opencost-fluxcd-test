apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-values
  namespace: headlamp
data:
  values.yaml: |
    replicaCount: 1
    
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
    
    service:
      type: ClusterIP
      port: 80
