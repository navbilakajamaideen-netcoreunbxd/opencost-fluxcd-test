apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-read-only-binding
  namespace: kubernetes-dashboard
subjects:
  - kind: ServiceAccount
    name: dashboard-readonly-user  
    namespace: kubernetes-dashboard
roleRef:
  kind: Role
  name: dashboard-read-only  
  apiGroup: rbac.authorization.k8s.io
