apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
spec:
  interval: 15m
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
      version: ">=1.0.0"
  values:
    opencost:
      ui:
        baseUrl: /
      prometheus:
        internal:
          enabled: true
          namespaceName: monitoring
          serviceName: prometheus-kube-prometheus-prometheus
          port: 9090
      exporter:
        scrapeInterval: 15m
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
