apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
spec:
  interval: 5m
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      ui:
        baseUrl: /
      prometheus:
        internal:
          enabled: true
          namespaceName: monitoring
          serviceName: prometheus-kube-prometheus-prometheus
          port: 9090
